<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Blog</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #f9fafb;
      }
      @media (prefers-color-scheme: dark) {
        html, body {
          background-color: #1f2937;
        }
      }
      .loading-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: system-ui, -apple-system, sans-serif;
        color: #6b7280;
      }
      @media (prefers-color-scheme: dark) {
        .loading-container {
          color: #9ca3af;
        }
      }
      .spinner {
        width: 24px;
        height: 24px;
        border: 2px solid #e5e7eb;
        border-top-color: #6b7280;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 12px;
      }
      @media (prefers-color-scheme: dark) {
        .spinner {
          border-color: #374151;
          border-top-color: #9ca3af;
        }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script>
      (function() {
        var l = window.location;
        var path = l.pathname + l.search + l.hash;
        sessionStorage.setItem('redirectPath', path);
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/blog/');
      })();
    </script>
  </head>
  <body>
    <div class="loading-container">
      <div class="spinner"></div>
      <span>Loading...</span>
    </div>
  </body>
</html>
