<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Blog</title>
    <script>
      // GitHub Pages SPA 404 Redirect
      // 保存当前路径到sessionStorage，然后重定向到index.html
      (function() {
        var l = window.location;
        sessionStorage.setItem('redirectPath', l.pathname + l.search + l.hash);
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
      })();
    </script>
  </head>
  <body>
  </body>
</html>
