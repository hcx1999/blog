<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Blog</title>
    <script>
      // For GitHub Pages 404 handling - Simple and direct
      (function() {
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/blog/' + 
          '?p=/' +
          l.pathname.slice(1).split('/').slice(1).join('/') +
          (l.search || '') +
          (l.hash || '')
        );
      })();
    </script>
  </head>
  <body>
  </body>
</html>
